<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA Marketing IPTV</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:15px;
text-align:center;
}

.box{
background:#0f172a;
padding:20px;
border-radius:15px;
max-width:520px;
margin:auto;
}

h2{
color:#38bdf8;
}

button{
padding:12px;
margin:6px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
width:45%;
}

.copy{
background:#16a34a;
width:100%;
}

textarea{
width:100%;
height:230px;
margin-top:10px;
border-radius:10px;
border:none;
padding:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h2>🤖 IA Marketing IPTV</h2>

<button onclick="gerar()">Gerar Mensagem</button>
<button onclick="gerarPost()">Gerar Post</button>

<textarea id="resultado"></textarea>

<button class="copy" onclick="copiar()">📋 Copiar</button>

</div>

<script>

function r(lista){
return lista[Math.floor(Math.random()*lista.length)]
}

let aberturas=[

"🔥 O IPTV que está conquistando todo mundo!",
"📺 Transforme sua TV em um cinema completo.",
"🚀 Chega de TV limitada!",
"💥 Assista tudo em um único aplicativo.",
"⭐ O melhor IPTV disponível hoje."

]

let conteudos=[

"+10.000 canais liberados",
"+15.000 canais e filmes",
"filmes e séries atualizados diariamente",
"lançamentos recentes de cinema",
"canais nacionais e internacionais",
"canais esportivos completos",
"catálogo com milhares de conteúdos"

]

let futebol=[

"todos os jogos ao vivo",
"Premiere liberado",
"Sportv liberado",
"Champions League e Libertadores",
"campeonatos nacionais e internacionais"

]

let beneficios=[

"imagem HD e Full HD",
"servidor rápido e estável",
"sem travamentos",
"ativação imediata",
"suporte completo",
"funciona com internet comum"

]

let dispositivos=[

"Smart TV",
"TV Box",
"celular",
"tablet",
"computador",
"Fire Stick"

]

let chamadas=[

"Peça um teste gratuito agora.",
"Teste grátis disponível.",
"Solicite seu teste agora mesmo.",
"Entre em contato e receba um teste grátis."

]

let precos=[

"💰 Apenas R$20 por mês",
"💰 Plano mensal R$20",
"💰 Acesso completo por R$20",
"💰 IPTV completo R$20 mensal"

]

function gerar(){

let mensagem=`

${r(aberturas)}

📺 Conteúdo disponível:

✔ ${r(conteudos)}
✔ ${r(conteudos)}

⚽ Esportes:

✔ ${r(futebol)}

⭐ Benefícios:

✔ ${r(beneficios)}
✔ ${r(beneficios)}
✔ ${r(beneficios)}

📱 Funciona em:

✔ ${r(dispositivos)}

${r(precos)}

🎁 ${r(chamadas)}

`

document.getElementById("resultado").value=mensagem

}

function gerarPost(){

let mensagem=`

${r(aberturas)}

Imagine ter acesso a milhares de canais, filmes e séries em um único lugar.

📺 ${r(conteudos)}
📺 ${r(conteudos)}
⚽ ${r(futebol)}

Tudo com:

✔ ${r(beneficios)}
✔ ${r(beneficios)}

📱 Compatível com ${r(dispositivos)}

${r(precos)}

🎁 ${r(chamadas)}

`

document.getElementById("resultado").value=mensagem

}

function copiar(){

let campo=document.getElementById("resultado")

if(campo.value==""){
alert("Gere uma mensagem primeiro")
return
}

campo.select()

document.execCommand("copy")

alert("Mensagem copiada!")

campo.value=""

}

</script>

</body>
</html>
